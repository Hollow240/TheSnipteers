<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnAnything — AI-Powered Learning Paths</title>
    <meta name="description" content="Generate an AI-powered, interactive learning path for any topic. Built with Gemini AI.">
    <meta property="og:title" content="LearnAnything — AI-Powered Learning Paths">
    <meta property="og:description" content="Type any topic and get a personalized curriculum with lessons, delivered by Gemini AI.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F9E0;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #333333;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #constellation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* ─── Home Search Container ─── */
        .container {
            position: relative;
            z-index: 10;
            text-align: left;
            max-width: 600px;
            width: 90%;
            padding: 2.5rem;
            background: #000000;
            border: 2px solid var(--border);
            border-radius: 0;
            box-shadow: 8px 8px 0px var(--border);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        p {
            color: #888888;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
            line-height: 1.4;
        }

        .search-form {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 1.2rem 1.5rem;
            border-radius: 0;
            border: 2px solid var(--border);
            background: transparent;
            color: #ffffff;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.15s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 4px 4px 0px var(--border);
        }

        .search-button {
            padding: 1.2rem 2.5rem;
            border-radius: 0;
            border: 2px solid var(--border);
            background: var(--text);
            color: var(--bg);
            font-family: inherit;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px var(--border);
        }

        .search-button:hover {
            background: #111111;
            color: #ffffff;
            border-color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border);
        }

        .search-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        /* ─── Tree View Container ─── */
        #tree-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            padding: 4rem 2rem;
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #000000;
        }

        .tree-row {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 5rem;
            width: 100%;
            position: relative;
        }

        /* ─── Node Cards ─── */
        @keyframes shake {
            0%   { transform: translateX(0); }
            15%  { transform: translateX(-6px); }
            30%  { transform: translateX(6px); }
            45%  { transform: translateX(-5px); }
            60%  { transform: translateX(5px); }
            75%  { transform: translateX(-3px); }
            90%  { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }

        .node-card {
            width: 160px;
            padding: 1.25rem 1rem;
            border-radius: 0;
            text-align: center;
            cursor: pointer;
            position: relative;
            z-index: 20;
            font-family: 'Inter', sans-serif;
            box-shadow: 4px 4px 0px var(--border);
            transition: border-color 0.05s, background 0.05s, box-shadow 0.05s, transform 0.05s;
            user-select: none;
        }

        .node-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border);
        }

        .node-card.is-active {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        .node-card.is-active h3,
        .node-card.is-active p {
            color: #000000 !important;
        }

        .node-card.shaking {
            animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        .node-card h3 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .node-card p {
            font-size: 0.75rem;
            margin: 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Status variants */
        .node-completed {
            border: 2px solid #ffffff;
            background: #ffffff;
            color: #000000;
        }

        .node-completed p {
            color: #555555;
        }

        .node-in_progress {
            border: 2px solid #ffffff;
            background: #000000;
            color: #ffffff;
            box-shadow: 6px 6px 0px #ffffff;
        }

        .node-in_progress p {
            color: #888888;
        }

        .node-locked {
            border: 2px solid #333333;
            background: #000000;
            color: #555555;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .node-locked p {
            color: #444444;
        }

        /* ─── SVG Connector Lines ─── */
        #connector-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .connection-line {
            transition: stroke 0.08s, stroke-width 0.08s;
        }

        /* ─── Back Button ─── */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #000000;
            border: 2px solid var(--border);
            border-radius: 0;
            color: white;
            cursor: pointer;
            z-index: 30;
            font-family: inherit;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .back-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--border);
        }

        .back-btn:active {
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* ─── Tutor Panel ─── */
        #tutor-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 32%;
            min-width: 340px;
            height: 100vh;
            background: #000000;
            border-left: 2px solid #333333;
            z-index: 50;
            transform: translateX(100%);
            /* Ultra-snappy spring easing */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            box-sizing: border-box;
        }

        #tutor-panel.open {
            transform: translateX(0);
        }

        .panel-close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            margin-bottom: 1.5rem;
            transition: color 0.08s;
        }

        .panel-close-btn:hover {
            color: #888888;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .panel-title {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        /* Terminal loading line */
        .panel-terminal-line {
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            color: #888888;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: 0.03em;
        }

        .panel-terminal-line.blink::after {
            content: '_';
            animation: blink-cursor 0.8s step-end infinite;
        }

        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .panel-body {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .panel-body h1, .panel-body h2, .panel-body h3 {
            color: #ffffff;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .panel-body p {
            margin-bottom: 1rem;
        }

        .panel-body ul, .panel-body ol {
            margin-bottom: 1rem;
            padding-left: 1.25rem;
        }

        .panel-body li {
            margin-bottom: 0.5rem;
        }

        .panel-body strong {
            color: #ffffff;
        }

        .panel-body code {
            background: #111111;
            border: 1px solid #333333;
            padding: 0.1em 0.4em;
            font-size: 0.9em;
        }

        /* ─── Complete Button ─── */
        .panel-complete-btn {
            padding: 1.2rem;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #333333;
            width: 100%;
            font-family: inherit;
        }

        .panel-complete-btn:hover {
            background: #000000;
            color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #333333;
        }

        .panel-complete-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #333333;
        }

        /* ─── Overlay (locked node) ─── */
        .node-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            background: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            box-shadow: 8px 8px 0px #333333;
            z-index: 100;
            text-align: center;
        }

        .node-overlay h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 800;
        }

        .node-overlay p {
            font-size: 1rem;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .node-overlay button {
            padding: 0.75rem 2rem;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit;
        }

        .node-overlay button:hover {
            background: #000000;
            color: #ffffff;
        }

        /* ─── Generation Progress Bar ─── */
        .gen-progress-bar {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .gen-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #444, #fff);
            transition: width 0.4s ease;
        }

        /* ─── Locked Node Tooltip ─── */
        .locked-tooltip {
            position: fixed;
            background: #111111;
            border: 1px solid #ffffff;
            padding: 0.6rem 0.9rem;
            font-size: 0.78rem;
            color: #cccccc;
            z-index: 300;
            max-width: 220px;
            box-shadow: 4px 4px 0px #333333;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            pointer-events: none;
            animation: tooltip-fade-in 0.1s ease;
        }
        @keyframes tooltip-fade-in {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Resume Banner ─── */
        #resume-banner {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #111111;
            border: 2px solid #333333;
            padding: 0.75rem 1.25rem;
            z-index: 200;
            display: flex;
            gap: 1rem;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            box-shadow: 4px 4px 0 #333;
            animation: tooltip-fade-in 0.2s ease;
        }
        /* ─── Suggestion Chips ─── */
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .chip {
            padding: 0.35rem 0.85rem;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.1s;
        }
        .chip:hover { border-color: #ffffff; color: #ffffff; }

        /* ─── Status Badge ─── */
        .node-status-badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0.15rem 0.4rem;
            margin-top: 0.3rem;
            border: 1px solid currentColor;
            opacity: 0.7;
        }

        /* ─── Mobile Responsive ─── */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 1.5rem; }
            h1 { font-size: 2.2rem; }
            .search-form { flex-direction: column; gap: 0.5rem; }
            .search-button { width: 100%; }
            .node-card { width: 130px; padding: 0.9rem 0.6rem; }
            .node-card h3 { font-size: 0.8rem; }
            .tree-row { gap: 1rem; flex-wrap: wrap; }
            #tutor-panel { width: 100%; min-width: unset; height: 70vh; top: auto; bottom: 0; border-left: none; border-top: 2px solid #333; transform: translateY(100%); }
            #tutor-panel.open { transform: translateY(0); }
            .back-btn { top: 0.75rem; left: 0.75rem; padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>

    <div class="container">

        <p>Generate an AI-powered learning path for any topic</p>
        <form class="search-form" id="search-form">
            <input type="text" class="search-input" id="search-query" placeholder="I want to learn..." required
                autocomplete="off">
            <button type="submit" class="search-button">Explore</button>
        </form>
        <div class="suggestion-chips">
            <button class="chip" onclick="fillSearch('Quantum Computing')">Quantum Computing</button>
            <button class="chip" onclick="fillSearch('Ancient Rome')">Ancient Rome</button>

            <button class="chip" onclick="fillSearch('Black Holes')">Black Holes</button>
        </div>
    </div>

    <!-- Tutor Panel -->
    <div id="tutor-panel">
        <button class="panel-close-btn" id="panel-close-btn">&times;</button>

            <h2 class="panel-title" id="panel-title">Select a node to begin</h2>
            <div class="panel-body" id="panel-body"></div>
            <div id="panel-actions" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; width: 100%;"></div>

        // ─── Constellation Canvas ───────────────────────────────────────────────────
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const targetX = (d) => {
            return d.wing === 'left' ? width * 0.15 : width * 0.85;

        const targetY = (d) => {
            const leftNodes = nodes.filter(n => n.wing === 'left');
            const rightNodes = nodes.filter(n => n.wing === 'right');
            if (d.wing === 'left') {
                const idx = leftNodes.indexOf(d);
                return idx % 2 === 0 ? height * 0.18 : height * 0.82;
            } else {
                const idx = rightNodes.indexOf(d);
                return idx % 2 === 0 ? height * 0.18 : height * 0.82;
            }
        };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            simulation.force('x', d3.forceX(targetX).strength(0.05));
            simulation.force('y', d3.forceY(targetY).strength(0.05));
            simulation.alpha(0.3).restart();
        });

                    const dx = node.x - cx;
                    const dy = node.y - cy;
                    const adx = Math.abs(dx);
                    const ady = Math.abs(dy);
                    if (adx < rx && ady < ry) {
                        const px = rx - adx;
                        const py = ry - ady;
                        
                        // Push out smoothly
                        const strength = 0.2;
                        if (px < py) {
                            node.vx += Math.sign(dx || 0.1) * px * strength;
                            // Damp inward horizontal velocity
                            if (dx > 0 && node.vx < 0) node.vx = 0;
                            if (dx < 0 && node.vx > 0) node.vx = 0;
                        } else {
                            node.vy += Math.sign(dy || 0.1) * py * strength;
                            // Damp inward vertical velocity
                            if (dy > 0 && node.vy < 0) node.vy = 0;
                            if (dy < 0 && node.vy > 0) node.vy = 0;

        const calculateNodeLevels = (nodes, links) => {
            const inDegree = {};
            const adj = {};
            nodes.forEach(n => {
                inDegree[n.id] = 0;
                adj[n.id] = [];
            });
            links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                if (adj[src]) adj[src].push(tgt);
                if (inDegree[tgt] !== undefined) inDegree[tgt]++;
            });

            const levels = {};
            const queue = [];
            nodes.forEach(n => {
                if (inDegree[n.id] === 0) {
                    levels[n.id] = 0;
                    queue.push(n.id);
                }
            });

            while (queue.length > 0) {
                const curr = queue.shift();
                const currLevel = levels[curr];
                adj[curr].forEach(child => {
                    levels[child] = Math.max(levels[child] || 0, currLevel + 1);
                    queue.push(child);
                });
            }

            nodes.forEach(n => {
                if (levels[n.id] === undefined) levels[n.id] = 0;
            });

            return levels;
        };

                const src = typeof link.source === 'object' ? link.source.id : link.source;
                const tgt = typeof link.target === 'object' ? link.target.id : link.target;
                if (src === nodeId) {
                    const nextNode = graphData.nodes.find(n => n.id === tgt);
                    if (nextNode && nextNode.status === "LOCKED") {
                        nextNode.status = "IN_PROGRESS";
                        _sp[tgt] = 'IN_PROGRESS';
                    }
                }
            });
            localStorage.setItem('la_progress_' + _tk, JSON.stringify(_sp));

            // 3. FORCE DOM RE-RENDER: Instantly toggle the visual classes
            document.querySelectorAll('.node-card').forEach(card => {
                const cId = card.dataset.id;
                const currentData = graphData.nodes.find(n => n.id === cId);
                
                if (currentData) {
                    // Remove old states cleanly
                    card.classList.remove('node-locked', 'node-in_progress', 'node-completed');
                    
                    const statusClass = `node-${currentData.status.toLowerCase()}`;
                    card.classList.add(statusClass);
                    
                    const badge = card.querySelector('.node-status-badge');
                    if (badge) {
                        badge.textContent = currentData.status.toLowerCase().replace('_', ' ');
                        badge.style.color = currentData.status === 'COMPLETED' ? '#ffffff' : (currentData.status === 'IN_PROGRESS' ? '#aaaaaa' : '#444');
                        if (currentData.isSpecial) badge.style.color = '#ff007f';
                    }

                    const title = card.querySelector('h3');
                    if (title && currentData.isSpecial) {
                        title.style.color = '#ff007f';
                    }

                    // Reset custom style overrides if unlocked
                    if (currentData.status !== "LOCKED") {
                        card.style.opacity = '';
                        card.style.cursor = '';
                    }

                    // Reinforce special borders
                    if (currentData.isSpecial) {
                        card.style.borderColor = '#ff007f';
                        card.style.boxShadow = '4px 4px 0px #ff007f';
                    }
                }
            });

            // 4. Update SVG connector colors
            graphData.links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                const path = document.getElementById(`link-${src}-${tgt}`);
                const parentEl = document.getElementById(`node-${src}`);
                if (path && parentEl) {
                    path.setAttribute('stroke', statusColor(parentEl));
                }
            });
        };

        // ─── Render Graph ────────────────────────────────────────────────────────────
        const renderGraph = (json) => {
            graphData = json; // ponytail: store the graph globally
            const treeContainer = document.getElementById('tree-container');
            treeContainer.innerHTML = '';
            treeContainer.style.display = 'flex';

            // Build adjacency map for SVG hover highlights
            // nodeId -> array of link source/target pairs (for SVG path lookup)
            const nodeLinks = {}; // nodeId -> [{ src, tgt }]
            json.nodes.forEach(n => { nodeLinks[n.id] = []; });
            json.links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                if (nodeLinks[src]) nodeLinks[src].push(`link-${src}-${tgt}`);
                if (nodeLinks[tgt]) nodeLinks[tgt].push(`link-${src}-${tgt}`);
            });

            // Back button
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Back';
            backBtn.onclick = () => {
                treeContainer.style.display = 'none';
                tutorPanel.classList.remove('open');
                if (activeNodeEl) { activeNodeEl.classList.remove('is-active'); activeNodeEl = null; }
                document.querySelector('.container').style.display = 'block';
                canvas.style.display = 'block';
                simulation.alpha(0.3).restart();
            };
            treeContainer.appendChild(backBtn);

            // Regenerate button
            const regenBtn = document.createElement('button');
            regenBtn.className = 'back-btn';
            regenBtn.textContent = '\u21ba Regenerate';
            regenBtn.style.cssText = 'left:auto;right:1.5rem;top:1.5rem;';
            regenBtn.onclick = () => {
                treeContainer.style.display = 'none';
                tutorPanel.classList.remove('open');
                if (activeNodeEl) { activeNodeEl.classList.remove('is-active'); activeNodeEl = null; }
                canvas.style.display = 'block';
                document.querySelector('.container').style.display = 'block';
                simulation.alpha(0.3).restart();
                setTimeout(() => generateNewCurriculum(currentSearchTopic), 50);
            };
            treeContainer.appendChild(regenBtn);

            // SVG connector layer
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.id = 'connector-svg';
            treeContainer.appendChild(svg);

            // Calculate levels and group rows
            const levels = calculateNodeLevels(json.nodes, json.links);

            // Initialize status — restore saved progress from localStorage if available
            const _rtk = currentSearchTopic.replace(/\s+/g, '_').toLowerCase();
            const _rsp = JSON.parse(localStorage.getItem('la_progress_' + _rtk) || '{}');
            json.nodes.forEach(n => {
                if (_rsp[n.id]) {
                    n.status = _rsp[n.id];
                } else if (!n.status) {
                    if (levels[n.id] === 0) {
                        n.status = "IN_PROGRESS";
                    } else {
                        n.status = "LOCKED";
                    }
                }
            });

            const rows = [];
            json.nodes.forEach(n => {
                const lvl = levels[n.id];
                if (!rows[lvl]) rows[lvl] = [];
                rows[lvl].push(n);
            });

            // Render rows and cards
            rows.forEach((rowNodes, lvlIdx) => {
                if (!rowNodes) return;
                const rowEl = document.createElement('div');
                rowEl.className = 'tree-row';

                rowNodes.forEach((node, nodeIdx) => {
                    const status = node.status.toLowerCase();
                    const nodeEl = document.createElement('div');
                    nodeEl.className = `node-card node-${status}`;
                    if (node.isSpecial) {
                        nodeEl.classList.add('node-special');
                        nodeEl.style.borderColor = '#ff007f';
                        nodeEl.style.boxShadow = '4px 4px 0px #ff007f';
                    }
                    nodeEl.id = `node-${node.id}`;
                    nodeEl.dataset.id = node.id; // Store ID for status updates

                    const titleEl = document.createElement('h3');
                    titleEl.textContent = node.name;
                    if (node.isSpecial) {
                        titleEl.style.color = '#ff007f';
                    }
                    nodeEl.appendChild(titleEl);

                    const descEl = document.createElement('p');
                    const _desc = node.description || '';
                    descEl.textContent = _desc.length > 55 ? _desc.substring(0, 52) + '...' : (_desc || status.replace('_', ' '));
                    if (node.isSpecial) descEl.style.color = '#ff007f';
                    nodeEl.appendChild(descEl);

                    // Status badge
                    const badge = document.createElement('span');
                    badge.className = 'node-status-badge';
                    badge.textContent = status.replace('_', ' ');
                    badge.style.color = status === 'completed' ? '#ffffff' : (status === 'in_progress' ? '#aaaaaa' : '#444');
                    if (node.isSpecial) badge.style.color = '#ff007f';
                    nodeEl.appendChild(badge);

                    // ── Hover: highlight connected SVG lines ──
                    nodeEl.addEventListener('mouseenter', () => {
                        const lineIds = nodeLinks[node.id] || [];
                        lineIds.forEach(id => {
                            const path = document.getElementById(id);
                            if (path) {
                                path.setAttribute('stroke', '#ffffff');
                                path.setAttribute('stroke-width', '2.5');
                            }
                        });
                    });

                    nodeEl.addEventListener('mouseleave', () => {
                        const lineIds = nodeLinks[node.id] || [];
                        lineIds.forEach(id => {
                            const path = document.getElementById(id);
                            if (path) {
                                // Restore original color based on source node status
                                const [, srcId] = id.split('-');
                                const srcEl = document.getElementById(`node-${srcId}`);
                                path.setAttribute('stroke', srcEl ? statusColor(srcEl) : '#333333');
                                path.setAttribute('stroke-width', '2');
                            }
                        });
                    });

                    // ── Click: shake if locked, open lesson otherwise ──
                    nodeEl.onclick = function(e) {
                        // STRICT OVERRIDE: Only block if it is explicitly locked and NOT in progress
                        if (nodeEl.classList.contains('node-locked') && !nodeEl.classList.contains('node-in_progress')) {
                            // Find prerequisite nodes
                            const prereqs = (graphData ? graphData.links : [])
                                .filter(l => (typeof l.target === 'object' ? l.target.id : l.target) === node.id)
                                .map(l => {
                                    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
                                    const srcNode = graphData.nodes.find(n => n.id === srcId);
                                    return srcNode ? srcNode.name : srcId;
                                });

                            // Remove existing tooltip
                            const existingTip = document.querySelector('.locked-tooltip');
                            if (existingTip) existingTip.remove();

                            const tip = document.createElement('div');
                            tip.className = 'locked-tooltip';
                            tip.innerHTML = `🔒 Complete <strong>${prereqs.length > 0 ? prereqs.slice(0,2).join(' or ') : 'a previous module'}</strong> first to unlock this.`;
                            document.body.appendChild(tip);

                            const rect = nodeEl.getBoundingClientRect();
                            tip.style.left = Math.max(8, rect.left + rect.width / 2 - tip.offsetWidth / 2) + 'px';
                            tip.style.top  = (rect.top - tip.offsetHeight - 10) + 'px';
                            setTimeout(() => tip && tip.remove(), 2800);

                            // Shake
                            nodeEl.classList.add('shaking');
                            setTimeout(() => nodeEl.classList.remove('shaking'), 400);
                            return;
                        }

                        // If it's completed or in-progress, let the user straight in!
                        document.querySelectorAll('.node-card').forEach(n => n.classList.remove('is-active'));
                        nodeEl.classList.add('is-active');

                        // Instantly snap open the panel and fetch the lesson content
                        openLessonPanel(node, currentSearchTopic);
                    };

                    rowEl.appendChild(nodeEl);
                });

                treeContainer.appendChild(rowEl);
            });

            // Draw SVG connector paths after elements are in DOM
            setTimeout(() => {
                const containerRect = treeContainer.getBoundingClientRect();
                svg.setAttribute('width', treeContainer.scrollWidth);
                svg.setAttribute('height', treeContainer.scrollHeight);

                json.links.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source.id : l.source;
                    const tgt = typeof l.target === 'object' ? l.target.id : l.target;

                    const parentEl = document.getElementById(`node-${src}`);
                    const childEl  = document.getElementById(`node-${tgt}`);

                    if (parentEl && childEl) {
                        const parentRect = parentEl.getBoundingClientRect();
                        const childRect  = childEl.getBoundingClientRect();

                        const x1 = parentRect.left + parentRect.width / 2 - containerRect.left + treeContainer.scrollLeft;
                        const y1 = parentRect.bottom - containerRect.top + treeContainer.scrollTop;
                        const x2 = childRect.left  + childRect.width  / 2 - containerRect.left + treeContainer.scrollLeft;
                        const y2 = childRect.top  - containerRect.top + treeContainer.scrollTop;

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const d = `M ${x1} ${y1} C ${x1} ${(y1 + y2) / 2}, ${x2} ${(y1 + y2) / 2}, ${x2} ${y2}`;
                        path.setAttribute('d', d);
                        path.setAttribute('stroke', statusColor(parentEl));
                        path.setAttribute('stroke-width', '2');
                        path.setAttribute('fill', 'none');
                        path.id = `link-${src}-${tgt}`;
                        path.classList.add('connection-line');
                        svg.appendChild(path);
                    }
                });
            }, 50);
        };

        const generateNewCurriculum = (query) => {
            const queryInput = document.getElementById('search-query');
            const submitButton = document.querySelector('.search-button');

            const originalPlaceholder = queryInput.placeholder;
            queryInput.disabled = true;
            submitButton.disabled = true;
            queryInput.value = '';
            queryInput.placeholder = 'Generating...';

            currentSearchTopic = query;

            // Show tutor panel immediately with terminal-style streaming output
            panelTitle.textContent = 'Generating Curriculum...';
            panelBody.innerHTML = `
                <p class="panel-terminal-line">> INITIATING GEMINI AI...</p>
                <p class="panel-terminal-line">> TOPIC: ${query.toUpperCase()}</p>
                <div class="gen-progress-bar"><div class="gen-progress-fill" id="gen-progress-fill"></div></div>
                <p class="panel-terminal-line" style="color:#555;font-size:0.8rem;">> Estimated: ~15 seconds</p>
                <p class="panel-terminal-line blink">> [ BUILDING CURRICULUM... ]</p>
            `;
            panelActions.innerHTML = '';
            tutorPanel.classList.add('open');

            // Animate progress bar
            let _progressPct = 0;
            let _progressFill = document.getElementById('gen-progress-fill');
            let _progressInterval = setInterval(() => {
                if (_progressFill && _progressPct < 88) {
                    _progressPct += (88 - _progressPct) * 0.05;
                    _progressFill.style.width = _progressPct.toFixed(1) + '%';
                }
            }, 400);

            const isFirstSearch = !sessionStorage.getItem('la_first_search_done');
            if (isFirstSearch) {
                sessionStorage.setItem('la_first_search_done', 'true');
            }

            fetch(API_BASE + '/api/generate-path', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    topic: query,
                    firstSearch: isFirstSearch
                })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok: ' + response.statusText);
                    return response.text();
                })
                .then(responseText => {
                    canvas.style.display = 'none';
                    simulation.stop();
                    tutorPanel.classList.remove('open');

                    let cleanJsonText = '';
                    try {
                        cleanJsonText = responseText.trim();

                        // 1. Strip any markdown code fences (```json ... ```)
                        if (cleanJsonText.includes("```")) {
                            cleanJsonText = cleanJsonText.replace(/```json|```/g, "").trim();
                        }

                        // 2. Strip any trailing backticks left over
                        cleanJsonText = cleanJsonText.replace(/`+$/, '').trim();

                        // 3. Extract strictly from first { or [ to last } or ]
                        const firstBracket = cleanJsonText.search(/[\{\[]/);
                        const lastBracketMatch = cleanJsonText.match(/[\}\]][^\}\]]*$/);
                        if (firstBracket !== -1 && lastBracketMatch) {
                            const lastBracketIndex = cleanJsonText.lastIndexOf(lastBracketMatch[0][0]);
                            cleanJsonText = cleanJsonText.substring(firstBracket, lastBracketIndex + 1);
                        }

                        // 4. Strip trailing commas before closing brackets
                        cleanJsonText = cleanJsonText.replace(/,\s*([\}\]])/g, '$1');

                        // 5. Parse and render
                        const parsedData = JSON.parse(cleanJsonText);
                        if (parsedData.error) {
                            throw new Error(parsedData.error);
                        }
                        if (!parsedData.nodes || !parsedData.links) {
                            throw new Error("Invalid curriculum response structure from server.");
                        }
                        document.querySelector('.container').style.display = 'none';
                        renderGraph(parsedData);
                        // Persist topic to localStorage for resume-on-load feature
                        localStorage.setItem('la_topic', query);
                        if (_progressFill) _progressFill.style.width = '100%';

                    } catch (parseError) {
                        console.error("JSON Parse Failure: ", parseError);
                        console.log("Failing cleanJsonText: ", cleanJsonText);
                        panelBody.innerHTML = `
                            <p class="panel-terminal-line">> [ PARSE ERROR ]</p>
                            <p class="panel-terminal-line" style="color:#ef4444;">> ${parseError.message}</p>
                        `;
                        tutorPanel.classList.add('open');
                    }
                })
                .catch(error => {
                    console.error('Error fetching learning path:', error);
                    panelBody.innerHTML = `
                        <p class="panel-terminal-line">> [ NETWORK ERROR ]</p>
                        <p class="panel-terminal-line" style="color:#ef4444;">> ${error.message}</p>
                    `;
                    tutorPanel.classList.add('open');
                })
                .finally(() => {
                    clearInterval(_progressInterval);
                    queryInput.disabled = false;
                    submitButton.disabled = false;
                    queryInput.placeholder = originalPlaceholder;
                    queryInput.value = query;
                });
        };

        // Search Bar Event Listener
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const queryInput = document.getElementById('search-query');
            generateNewCurriculum(queryInput.value.trim());
        });

        // fillSearch: used by suggestion chips to populate the search input
        function fillSearch(topic) {
            const input = document.getElementById('search-query');
            input.value = topic;
            input.focus();
        }

        function triggerBoredFeature() {
            const assetsPool = [
                // Genuinely interesting topics to auto-generate curriculum for
                { type: 'topic', title: 'Chaos Theory' },
                { type: 'topic', title: 'The Fermi Paradox' },
                { type: 'topic', title: 'Game Theory' },
                { type: 'topic', title: 'Cognitive Biases' },
                { type: 'topic', title: 'Cryptography' },
                { type: 'topic', title: 'Philosophy of Mind' },
                { type: 'topic', title: 'Evolutionary Biology' },
                { type: 'topic', title: 'Linguistics' },
                { type: 'topic', title: 'Behavioral Economics' },
                { type: 'topic', title: 'Ancient Rome' },
                { type: 'url', url: 'https://neal.fun/deep-sea/', title: 'The Deep Sea — Interactive Dive' },
                { type: 'url', url: 'https://ourworldindata.org', title: 'Our World In Data — Visualize Everything' },
                { type: 'url', url: 'https://en.m.wikipedia.org/wiki/Special:Random', title: 'Random Wikipedia Article' },
                { type: 'quote', text: '"The unexamined life is not worth living." — Socrates' },
                { type: 'quote', text: '"We are what we repeatedly do. Excellence, then, is not an act, but a habit." — Aristotle' },
                { type: 'quote', text: '"The measure of intelligence is the ability to change." — Einstein' },
                { type: 'quote', text: '"In the middle of difficulty lies opportunity." — Einstein' },
                { type: 'quote', text: '"The only true wisdom is in knowing you know nothing." — Socrates' },
            ];

            const randomItem = assetsPool[Math.floor(Math.random() * assetsPool.length)];

            const _tp = document.getElementById('tutor-panel');
            const _pTitle = document.getElementById('panel-title');
            const _pBody = document.getElementById('panel-body');
            document.getElementById('panel-actions').innerHTML = '';

            const surpriseBtn = `<button onclick="triggerBoredFeature()" style="margin-top:20px;padding:10px 20px;background:none;border:2px solid #ff007f;color:#ff007f;font-family:inherit;font-weight:800;text-transform:uppercase;cursor:pointer;font-size:0.85rem;display:block;">&#8635; Surprise Me Again</button>`;

            if (randomItem.type === 'quote') {
                _pTitle.textContent = '\U0001f4a1 Random Wisdom';
                _pBody.innerHTML = '<p style="font-size:1.3rem;font-style:italic;line-height:1.7;margin-top:2rem;color:#ff007f;">' + randomItem.text + '</p>' + surpriseBtn;
            } else if (randomItem.type === 'url') {
                _pTitle.textContent = '\U0001f3af Something to Explore';
                _pBody.innerHTML = '<p style="font-size:1.1rem;margin-top:1.5rem;color:#fff;">' + randomItem.title + '</p><a href="' + randomItem.url + '" target="_blank" style="display:inline-block;background:#ff007f;color:#000;padding:12px 24px;text-decoration:none;margin-top:1rem;font-weight:800;font-family:monospace;">[ Open ]</a>' + surpriseBtn;
            } else if (randomItem.type === 'topic') {
                _pTitle.textContent = '\U0001f680 Random Rabbit Hole';
                _pBody.innerHTML = '<p style="font-size:1rem;margin-top:1.5rem;color:#888;">How about learning:</p><p style="font-size:1.5rem;font-weight:800;margin-top:0.5rem;color:#fff;">' + randomItem.title + '</p><button onclick="document.getElementById(\'tutor-panel\').classList.remove(\'open\'); generateNewCurriculum(\'' + randomItem.title + '\');" style="margin-top:1.5rem;padding:12px 24px;background:#ff007f;color:#000;border:none;font-family:inherit;font-weight:800;text-transform:uppercase;cursor:pointer;font-size:1rem;display:block;">Generate Curriculum</button>' + surpriseBtn;
            }

            _tp.classList.add('open');
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // Close tutor panel
                const tp = document.getElementById('tutor-panel');
                if (tp && tp.classList.contains('open')) {
                    tp.classList.remove('open');
                    document.querySelectorAll('.node-card').forEach(n => n.classList.remove('is-active'));
                }
                // Dismiss any locked tooltip
                const tip = document.querySelector('.locked-tooltip');
                if (tip) tip.remove();
            }
        });

        // Resume Last Session on Page Load
        window.addEventListener('load', () => {
            const savedTopic = localStorage.getItem('la_topic');
            if (!savedTopic) return;

            const banner = document.createElement('div');
            banner.id = 'resume-banner';

            const label = document.createElement('span');
            label.style.color = '#888';
            label.innerHTML = 'Resume: <strong style="color:#fff;">' + savedTopic + '</strong>?';

            const resumeBtn = document.createElement('button');
            resumeBtn.textContent = 'Resume';
            resumeBtn.style.cssText = 'background:#fff;color:#000;border:none;padding:0.4rem 0.9rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;font-size:0.8rem;';
            resumeBtn.onclick = () => { banner.remove(); generateNewCurriculum(savedTopic); };

            const clearBtn = document.createElement('button');
            clearBtn.textContent = 'Clear';
            clearBtn.style.cssText = 'background:none;border:none;color:#444;cursor:pointer;font-family:inherit;font-size:0.75rem;text-decoration:underline;';
            clearBtn.onclick = () => {
                localStorage.removeItem('la_topic');
                localStorage.removeItem('la_progress_' + savedTopic.replace(/\s+/g, '_').toLowerCase());
                banner.remove();
            };

            const dismissBtn = document.createElement('button');
            dismissBtn.innerHTML = '&times;';
            dismissBtn.style.cssText = 'background:none;border:none;color:#555;cursor:pointer;font-size:1.4rem;line-height:1;padding:0;';
            dismissBtn.onclick = () => banner.remove();

            banner.appendChild(label);
            banner.appendChild(resumeBtn);
            banner.appendChild(clearBtn);
            banner.appendChild(dismissBtn);
            document.body.appendChild(banner);
        });
    </script>
</body>
