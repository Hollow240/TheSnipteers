<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Anything - Constellation Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #333333;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #constellation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* ─── Home Search Container ─── */
        .container {
            position: relative;
            z-index: 10;
            text-align: left;
            max-width: 600px;
            width: 90%;
            padding: 2.5rem;
            background: #000000;
            border: 2px solid var(--border);
            border-radius: 0;
            box-shadow: 8px 8px 0px var(--border);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        p {
            color: #888888;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
            line-height: 1.4;
        }

        .search-form {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 1.2rem 1.5rem;
            border-radius: 0;
            border: 2px solid var(--border);
            background: transparent;
            color: #ffffff;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.15s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 4px 4px 0px var(--border);
        }

        .search-button {
            padding: 1.2rem 2.5rem;
            border-radius: 0;
            border: 2px solid var(--border);
            background: var(--text);
            color: var(--bg);
            font-family: inherit;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px var(--border);
        }

        .search-button:hover {
            background: #111111;
            color: #ffffff;
            border-color: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border);
        }

        .search-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        /* ─── Tree View Container ─── */
        #tree-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            padding: 4rem 2rem;
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #000000;
        }

        .tree-row {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 5rem;
            width: 100%;
            position: relative;
        }

        /* ─── Node Cards ─── */
        @keyframes shake {
            0%   { transform: translateX(0); }
            15%  { transform: translateX(-6px); }
            30%  { transform: translateX(6px); }
            45%  { transform: translateX(-5px); }
            60%  { transform: translateX(5px); }
            75%  { transform: translateX(-3px); }
            90%  { transform: translateX(3px); }
            100% { transform: translateX(0); }
        }

        .node-card {
            width: 160px;
            padding: 1.25rem 1rem;
            border-radius: 0;
            text-align: center;
            cursor: pointer;
            position: relative;
            z-index: 20;
            font-family: 'Inter', sans-serif;
            box-shadow: 4px 4px 0px var(--border);
            transition: border-color 0.05s, background 0.05s, box-shadow 0.05s, transform 0.05s;
            user-select: none;
        }

        .node-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border);
        }

        .node-card.is-active {
            background: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        .node-card.is-active h3,
        .node-card.is-active p {
            color: #000000 !important;
        }

        .node-card.shaking {
            animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        .node-card h3 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .node-card p {
            font-size: 0.75rem;
            margin: 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Status variants */
        .node-completed {
            border: 2px solid #ffffff;
            background: #ffffff;
            color: #000000;
        }

        .node-completed p {
            color: #555555;
        }

        .node-in_progress {
            border: 2px solid #ffffff;
            background: #000000;
            color: #ffffff;
            box-shadow: 6px 6px 0px #ffffff;
        }

        .node-in_progress p {
            color: #888888;
        }

        .node-locked {
            border: 2px solid #333333;
            background: #000000;
            color: #555555;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .node-locked p {
            color: #444444;
        }

        /* ─── SVG Connector Lines ─── */
        #connector-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .connection-line {
            transition: stroke 0.08s, stroke-width 0.08s;
        }

        /* ─── Back Button ─── */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #000000;
            border: 2px solid var(--border);
            border-radius: 0;
            color: white;
            cursor: pointer;
            z-index: 30;
            font-family: inherit;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.1s;
        }

        .back-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--border);
        }

        .back-btn:active {
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* ─── Tutor Panel ─── */
        #tutor-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 32%;
            min-width: 340px;
            height: 100vh;
            background: #000000;
            border-left: 2px solid #333333;
            z-index: 50;
            transform: translateX(100%);
            /* Ultra-snappy spring easing */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            box-sizing: border-box;
        }

        #tutor-panel.open {
            transform: translateX(0);
        }

        .panel-close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            margin-bottom: 1.5rem;
            transition: color 0.08s;
        }

        .panel-close-btn:hover {
            color: #888888;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .panel-title {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        /* Terminal loading line */
        .panel-terminal-line {
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            color: #888888;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: 0.03em;
        }

        .panel-terminal-line.blink::after {
            content: '_';
            animation: blink-cursor 0.8s step-end infinite;
        }

        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .panel-body {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .panel-body h1, .panel-body h2, .panel-body h3 {
            color: #ffffff;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .panel-body p {
            margin-bottom: 1rem;
        }

        .panel-body ul, .panel-body ol {
            margin-bottom: 1rem;
            padding-left: 1.25rem;
        }

        .panel-body li {
            margin-bottom: 0.5rem;
        }

        .panel-body strong {
            color: #ffffff;
        }

        .panel-body code {
            background: #111111;
            border: 1px solid #333333;
            padding: 0.1em 0.4em;
            font-size: 0.9em;
        }

        /* ─── Complete Button ─── */
        .panel-complete-btn {
            padding: 1.2rem;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #333333;
            width: 100%;
            font-family: inherit;
        }

        .panel-complete-btn:hover {
            background: #000000;
            color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #333333;
        }

        .panel-complete-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #333333;
        }

        /* ─── Overlay (locked node) ─── */
        .node-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            background: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            box-shadow: 8px 8px 0px #333333;
            z-index: 100;
            text-align: center;
        }

        .node-overlay h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 800;
        }

        .node-overlay p {
            font-size: 1rem;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .node-overlay button {
            padding: 0.75rem 2rem;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            border-radius: 0;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            font-family: inherit;
        }

        .node-overlay button:hover {
            background: #000000;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <canvas id="constellation"></canvas>

    <div class="container">
        <h1>Learn Anything</h1>
        <p>Generate an AI-powered learning path for any topic</p>
        <form class="search-form" id="search-form">
            <input type="text" class="search-input" id="search-query" placeholder="I want to learn..." required
                autocomplete="off">
            <button type="submit" class="search-button">Explore</button>
        </form>
    </div>

    <!-- Tutor Panel -->
    <div id="tutor-panel">
        <button class="panel-close-btn" id="panel-close-btn">&times;</button>
        <div class="panel-content" id="panel-content">
            <h2 class="panel-title" id="panel-title">Select a node to begin</h2>
            <div class="panel-body" id="panel-body"></div>
        </div>
        <button class="panel-complete-btn" id="panel-complete-btn" style="display: none;">Mark as Complete</button>
    </div>

    <!-- Tree Container -->
    <div id="tree-container"></div>

    <!-- D3.js via CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // ─── Constellation Canvas ───────────────────────────────────────────────────
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            simulation.force('center', d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        const topics = ["Math", "Physics", "AI", "History", "Coding", "Music", "Art", "Biology", "Economics", "Philosophy", "Astronomy", "Design"];
        const nodes = topics.map((name, id) => ({ id, name }));
        const links = [];

        for (let i = 1; i < nodes.length; i++) {
            links.push({ source: Math.floor(Math.random() * i), target: i });
        }

        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(160))
            .force('charge', d3.forceManyBody().strength(-300)) // ponytail: aggressive repulsion so nodes spread across the full canvas
            .force('center', d3.forceCenter(width / 2, height / 2))
            .velocityDecay(0.25);

        simulation.alphaTarget(0.02).restart();

        // ─── Drag Behaviour ─────────────────────────────────────────────────────────
        // ponytail: keep dragging vanilla D3, no external motion engines
        let hoveredNodeId = null;

        const drag = d3.drag()
            .subject((event) => {
                // Find the node closest to the click point
                const mx = event.x, my = event.y;
                let closest = null, minDist = Infinity;
                nodes.forEach(n => {
                    const dx = n.x - mx, dy = n.y - my;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist && dist < 20) { minDist = dist; closest = n; }
                });
                return closest;
            })
            .on('start', (event) => {
                if (!event.subject) return;
                if (!event.active) simulation.alphaTarget(0.3).restart(); // heat up sim on grab
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            })
            .on('drag', (event) => {
                if (!event.subject) return;
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            })
            .on('end', (event) => {
                if (!event.subject) return;
                if (!event.active) simulation.alphaTarget(0.02); // cool back to idle drift
                event.subject.fx = null; // release: elastic bands snap it back into equilibrium
                event.subject.fy = null;
            });

        // Apply drag to the canvas element — translate pointer events to node coords
        d3.select(canvas)
            .call(drag)
            .on('mousemove', (event) => {
                const [mx, my] = d3.pointer(event);
                let found = null;
                nodes.forEach(n => {
                    const dx = n.x - mx, dy = n.y - my;
                    if (Math.sqrt(dx * dx + dy * dy) < 18) found = n.id;
                });
                hoveredNodeId = found;
                canvas.style.cursor = (found !== null) ? 'pointer' : 'default'; // ponytail: show pointer cursor when hovering background nodes
            })
            .on('mouseleave', () => { 
                hoveredNodeId = null; 
                canvas.style.cursor = 'default';
            })
            .on('click', () => {
                // ponytail: click a drifting background node to directly fast-travel to that topic
                if (hoveredNodeId !== null) {
                    const clickedNode = nodes.find(n => n.id === hoveredNodeId);
                    if (clickedNode) {
                        document.querySelector('.container').style.display = "none";
                        const selectedTopic = clickedNode.name || clickedNode.id;
                        document.getElementById('search-query').value = selectedTopic;
                        generateNewCurriculum(selectedTopic);
                    }
                }
            });

        simulation.on('tick', () => {
            ctx.clearRect(0, 0, width, height);

            // ponytail: build a set of link IDs connected to the hovered node for O(1) lookup
            const highlightLinks = new Set();
            if (hoveredNodeId !== null) {
                links.forEach((link, i) => {
                    const s = typeof link.source === 'object' ? link.source.id : link.source;
                    const t = typeof link.target === 'object' ? link.target.id : link.target;
                    if (s === hoveredNodeId || t === hoveredNodeId) highlightLinks.add(i);
                });
            }

            // Draw links — highlight connected ones instantly
            links.forEach((link, i) => {
                const isHighlighted = highlightLinks.has(i);
                ctx.strokeStyle = isHighlighted ? '#ffffff' : '#333333';
                ctx.lineWidth   = isHighlighted ? 2.5 : 1;
                ctx.beginPath();
                ctx.moveTo(link.source.x, link.source.y);
                ctx.lineTo(link.target.x, link.target.y);
                ctx.stroke();
            });

            nodes.forEach(node => {
                const isHovered = node.id === hoveredNodeId;
                ctx.beginPath();
                ctx.arc(node.x, node.y, isHovered ? 6 : 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 0;
                ctx.fill();

                ctx.fillStyle = isHovered ? '#ffffff' : '#888888';
                ctx.font = isHovered ? '600 12px Inter, sans-serif' : '400 12px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(node.name, node.x, node.y - 12);
            });
        });

        // ─── State ─────────────────────────────────────────────────────────────────
        let currentSearchTopic = '';
        let activeNodeEl = null;
        let graphData = null; // ponytail: store curriculum data globally to manage status transitions
        const API_BASE = window.location.protocol.startsWith('file') ? 'http://localhost:8082' : '';

        // ─── Tutor Panel Logic ──────────────────────────────────────────────────────
        const tutorPanel   = document.getElementById('tutor-panel');
        const panelTitle   = document.getElementById('panel-title');
        const panelBody    = document.getElementById('panel-body');
        const completeBtn  = document.getElementById('panel-complete-btn');
        const panelCloseBtn = document.getElementById('panel-close-btn');

        panelCloseBtn.addEventListener('click', () => {
            tutorPanel.classList.remove('open');
            if (activeNodeEl) {
                activeNodeEl.classList.remove('is-active');
                activeNodeEl = null;
            }
        });

        // ─── Node Level Calculator ──────────────────────────────────────────────────
        const calculateNodeLevels = (nodes, links) => {
            const inDegree = {};
            const adj = {};
            nodes.forEach(n => {
                inDegree[n.id] = 0;
                adj[n.id] = [];
            });
            links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                if (adj[src]) adj[src].push(tgt);
                if (inDegree[tgt] !== undefined) inDegree[tgt]++;
            });

            const levels = {};
            const queue = [];
            nodes.forEach(n => {
                if (inDegree[n.id] === 0) {
                    levels[n.id] = 0;
                    queue.push(n.id);
                }
            });

            while (queue.length > 0) {
                const curr = queue.shift();
                const currLevel = levels[curr];
                adj[curr].forEach(child => {
                    levels[child] = Math.max(levels[child] || 0, currLevel + 1);
                    queue.push(child);
                });
            }

            nodes.forEach(n => {
                if (levels[n.id] === undefined) levels[n.id] = 0;
            });

            return levels;
        };

        // ─── Connection Line Color by Status ───────────────────────────────────────
        const statusColor = (el) => {
            if (el.classList.contains('node-completed')) return '#ffffff';
            if (el.classList.contains('node-in_progress')) return '#888888';
            return '#333333';
        };

        // ─── Locked Overlay ─────────────────────────────────────────────────────────
        const showOverlay = (title, description) => {
            const existing = document.querySelector('.node-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.className = 'node-overlay';

            const h2 = document.createElement('h2');
            h2.textContent = title;
            overlay.appendChild(h2);

            const p = document.createElement('p');
            p.textContent = description || 'No description available.';
            overlay.appendChild(p);

            const btn = document.createElement('button');
            btn.textContent = 'Close';
            btn.onclick = () => overlay.remove();
            overlay.appendChild(btn);

            document.body.appendChild(overlay);
        };

        // ─── Open Lesson in Tutor Panel ─────────────────────────────────────────────
        const openLessonPanel = (node, topic) => {
            // Deactivate previous active card
            if (activeNodeEl) activeNodeEl.classList.remove('is-active');

            activeNodeEl = document.getElementById(`node-${node.id}`);
            if (activeNodeEl) activeNodeEl.classList.add('is-active');

            // Populate panel immediately with terminal loading printout
            panelTitle.textContent = node.name;
            panelBody.innerHTML = `
                <p class="panel-terminal-line">> INITIALIZING LESSON MODULE...</p>
                <p class="panel-terminal-line">> TOPIC: ${topic.toUpperCase()}</p>
                <p class="panel-terminal-line">> NODE: ${node.name.toUpperCase()}</p>
                <p class="panel-terminal-line blink">> [ FETCHING LESSON_DATA... ]</p>
            `;
            completeBtn.style.display = 'none';

            // Snap panel open immediately
            tutorPanel.classList.add('open');

            fetch(API_BASE + '/api/get-lesson', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic: topic,
                    nodeTitle: node.name,
                    nodeDescription: node.description || ''
                })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Failed to fetch lesson: ' + response.statusText);
                    return response.text();
                })
                .then(markdown => {
                    panelBody.innerHTML = marked.parse(markdown);

                    // Dynamic Resource & GitHub Link Injection
                    const resourcesHtml = `
                        <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 15px;">
                            <span style="color: #666; font-size: 11px; display: block; margin-bottom: 8px;">EXTERNAL RESOURCES:</span>
                            <a href="https://github.com/Hollow240/TheSnipteers" target="_blank" style="color: #fff; text-decoration: none; font-size: 13px; font-family: monospace; display: block; margin-bottom: 6px;">[ PROJECT SOURCE GITHUB ↗ ]</a>
                            ${node.resources ? node.resources.map(res => `<div style="font-family: monospace; font-size: 13px; margin-top: 4px; color: #888;">[ RESOURCE: ${marked.parseInline(res)} ]</div>`).join('') : ''}
                        </div>
                    `;
                    panelBody.innerHTML += resourcesHtml;

                    if (activeNodeEl && activeNodeEl.classList.contains('node-in_progress')) {
                        completeBtn.style.display = 'block';
                        completeBtn.onclick = () => {
                            markModuleComplete(node.id);
                            tutorPanel.classList.remove('open');
                            if (activeNodeEl) {
                                activeNodeEl.classList.remove('is-active');
                                activeNodeEl = null;
                            }
                        };
                    }
                })
                .catch(error => {
                    console.error('Error fetching lesson:', error);
                    panelBody.innerHTML = `
                        <p class="panel-terminal-line">> [ ERROR ]</p>
                        <p class="panel-terminal-line" style="color:#ef4444;">> ${error.message}</p>
                    `;
                });
        };

        // Force immediate unlocking when a module is marked complete
        const markModuleComplete = (nodeId) => {
            if (!graphData) return;

            // 1. Find the target node in your data structure and update status
            const targetNode = graphData.nodes.find(n => n.id === nodeId);
            if (targetNode) {
                targetNode.status = "COMPLETED";
            }

            // 2. Unlock the immediate next dependent nodes in the chain
            graphData.links.forEach(link => {
                const src = typeof link.source === 'object' ? link.source.id : link.source;
                const tgt = typeof link.target === 'object' ? link.target.id : link.target;
                if (src === nodeId) {
                    const nextNode = graphData.nodes.find(n => n.id === tgt);
                    if (nextNode && nextNode.status === "LOCKED") {
                        nextNode.status = "IN_PROGRESS";
                    }
                }
            });

            // 3. FORCE DOM RE-RENDER: Instantly toggle the visual classes
            document.querySelectorAll('.node-card').forEach(card => {
                const cId = card.dataset.id;
                const currentData = graphData.nodes.find(n => n.id === cId);
                
                if (currentData) {
                    // Remove old states cleanly
                    card.classList.remove('node-locked', 'node-in_progress', 'node-completed');
                    
                    const statusClass = `node-${currentData.status.toLowerCase()}`;
                    card.classList.add(statusClass);
                    
                    const desc = card.querySelector('p');
                    if (desc) {
                        desc.textContent = currentData.status.toLowerCase().replace('_', ' ');
                    }

                    // Reset custom style overrides if unlocked
                    if (currentData.status !== "LOCKED") {
                        card.style.opacity = '';
                        card.style.cursor = '';
                    }
                }
            });

            // 4. Update SVG connector colors
            graphData.links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                const path = document.getElementById(`link-${src}-${tgt}`);
                const parentEl = document.getElementById(`node-${src}`);
                if (path && parentEl) {
                    path.setAttribute('stroke', statusColor(parentEl));
                }
            });
        };

        // ─── Render Graph ────────────────────────────────────────────────────────────
        const renderGraph = (json) => {
            graphData = json; // ponytail: store the graph globally
            const treeContainer = document.getElementById('tree-container');
            treeContainer.innerHTML = '';
            treeContainer.style.display = 'flex';

            // Build adjacency map for SVG hover highlights
            // nodeId -> array of link source/target pairs (for SVG path lookup)
            const nodeLinks = {}; // nodeId -> [{ src, tgt }]
            json.nodes.forEach(n => { nodeLinks[n.id] = []; });
            json.links.forEach(l => {
                const src = typeof l.source === 'object' ? l.source.id : l.source;
                const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                if (nodeLinks[src]) nodeLinks[src].push(`link-${src}-${tgt}`);
                if (nodeLinks[tgt]) nodeLinks[tgt].push(`link-${src}-${tgt}`);
            });

            // Back button
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Back';
            backBtn.onclick = () => {
                treeContainer.style.display = 'none';
                tutorPanel.classList.remove('open');
                if (activeNodeEl) { activeNodeEl.classList.remove('is-active'); activeNodeEl = null; }
                document.querySelector('.container').style.display = 'block';
                canvas.style.display = 'block';
                simulation.alpha(0.3).restart();
            };
            treeContainer.appendChild(backBtn);

            // SVG connector layer
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.id = 'connector-svg';
            treeContainer.appendChild(svg);

            // Calculate levels and group rows
            const levels = calculateNodeLevels(json.nodes, json.links);

            // Initialize status of each node if not set
            json.nodes.forEach(n => {
                if (!n.status) {
                    if (levels[n.id] === 0) {
                        n.status = "IN_PROGRESS";
                    } else {
                        n.status = "LOCKED";
                    }
                }
            });

            const rows = [];
            json.nodes.forEach(n => {
                const lvl = levels[n.id];
                if (!rows[lvl]) rows[lvl] = [];
                rows[lvl].push(n);
            });

            // Render rows and cards
            rows.forEach((rowNodes, lvlIdx) => {
                if (!rowNodes) return;
                const rowEl = document.createElement('div');
                rowEl.className = 'tree-row';

                rowNodes.forEach((node, nodeIdx) => {
                    const status = node.status.toLowerCase();
                    const nodeEl = document.createElement('div');
                    nodeEl.className = `node-card node-${status}`;
                    nodeEl.id = `node-${node.id}`;
                    nodeEl.dataset.id = node.id; // Store ID for status updates

                    const titleEl = document.createElement('h3');
                    titleEl.textContent = node.name;
                    nodeEl.appendChild(titleEl);

                    const descEl = document.createElement('p');
                    descEl.textContent = status.replace('_', ' ');
                    nodeEl.appendChild(descEl);

                    // ── Hover: highlight connected SVG lines ──
                    nodeEl.addEventListener('mouseenter', () => {
                        const lineIds = nodeLinks[node.id] || [];
                        lineIds.forEach(id => {
                            const path = document.getElementById(id);
                            if (path) {
                                path.setAttribute('stroke', '#ffffff');
                                path.setAttribute('stroke-width', '2.5');
                            }
                        });
                    });

                    nodeEl.addEventListener('mouseleave', () => {
                        const lineIds = nodeLinks[node.id] || [];
                        lineIds.forEach(id => {
                            const path = document.getElementById(id);
                            if (path) {
                                // Restore original color based on source node status
                                const [, srcId] = id.split('-');
                                const srcEl = document.getElementById(`node-${srcId}`);
                                path.setAttribute('stroke', srcEl ? statusColor(srcEl) : '#333333');
                                path.setAttribute('stroke-width', '2');
                            }
                        });
                    });

                    // ── Click: shake if locked, open lesson otherwise ──
                    nodeEl.addEventListener('click', () => {
                        if (status === 'locked') {
                            // Mechanical shake feedback
                            nodeEl.classList.remove('shaking');
                            void nodeEl.offsetWidth; // reflow to restart animation
                            nodeEl.classList.add('shaking');
                            nodeEl.addEventListener('animationend', () => {
                                nodeEl.classList.remove('shaking');
                            }, { once: true });
                            return;
                        }
                        openLessonPanel(node, currentSearchTopic);
                    });

                    rowEl.appendChild(nodeEl);
                });

                treeContainer.appendChild(rowEl);
            });

            // Draw SVG connector paths after elements are in DOM
            setTimeout(() => {
                const containerRect = treeContainer.getBoundingClientRect();
                svg.setAttribute('width', treeContainer.scrollWidth);
                svg.setAttribute('height', treeContainer.scrollHeight);

                json.links.forEach(l => {
                    const src = typeof l.source === 'object' ? l.source.id : l.source;
                    const tgt = typeof l.target === 'object' ? l.target.id : l.target;

                    const parentEl = document.getElementById(`node-${src}`);
                    const childEl  = document.getElementById(`node-${tgt}`);

                    if (parentEl && childEl) {
                        const parentRect = parentEl.getBoundingClientRect();
                        const childRect  = childEl.getBoundingClientRect();

                        const x1 = parentRect.left + parentRect.width / 2 - containerRect.left + treeContainer.scrollLeft;
                        const y1 = parentRect.bottom - containerRect.top + treeContainer.scrollTop;
                        const x2 = childRect.left  + childRect.width  / 2 - containerRect.left + treeContainer.scrollLeft;
                        const y2 = childRect.top  - containerRect.top + treeContainer.scrollTop;

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const d = `M ${x1} ${y1} C ${x1} ${(y1 + y2) / 2}, ${x2} ${(y1 + y2) / 2}, ${x2} ${y2}`;
                        path.setAttribute('d', d);
                        path.setAttribute('stroke', statusColor(parentEl));
                        path.setAttribute('stroke-width', '2');
                        path.setAttribute('fill', 'none');
                        path.id = `link-${src}-${tgt}`;
                        path.classList.add('connection-line');
                        svg.appendChild(path);
                    }
                });
            }, 50);
        };

        const generateNewCurriculum = (query) => {
            const queryInput = document.getElementById('search-query');
            const submitButton = document.querySelector('.search-button');

            const originalPlaceholder = queryInput.placeholder;
            queryInput.disabled = true;
            submitButton.disabled = true;
            queryInput.value = '';
            queryInput.placeholder = 'Generating...';

            currentSearchTopic = query;

            // Show tutor panel immediately with terminal-style streaming output
            panelTitle.textContent = 'Generating Curriculum...';
            panelBody.innerHTML = `
                <p class="panel-terminal-line">> INITIATING GEMINI AI...</p>
                <p class="panel-terminal-line">> TOPIC: ${query.toUpperCase()}</p>
                <p class="panel-terminal-line blink">> [ BUILDING CURRICULUM... ]</p>
            `;
            completeBtn.style.display = 'none';
            tutorPanel.classList.add('open');

            fetch(API_BASE + '/api/generate-path', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: query })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok: ' + response.statusText);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let accumulatedText = '';

                    // Append raw JSON chunks to panel body as they stream in
                    const streamLine = document.createElement('p');
                    streamLine.className = 'panel-terminal-line';
                    streamLine.style.wordBreak = 'break-all';
                    streamLine.style.opacity = '0.4';
                    panelBody.appendChild(streamLine);

                    function read() {
                        return reader.read().then(({ done, value }) => {
                            if (done) {
                                canvas.style.display = 'none';
                                simulation.stop();
                                tutorPanel.classList.remove('open');

                                try {
                                    const data = JSON.parse(accumulatedText);
                                    document.querySelector('.container').style.display = 'none';
                                    renderGraph(data);
                                } catch (err) {
                                    console.error('Failed to parse curriculum JSON:', err);
                                    panelBody.innerHTML = `
                                        <p class="panel-terminal-line">> [ PARSE ERROR ]</p>
                                        <p class="panel-terminal-line" style="color:#ef4444;">> ${err.message}</p>
                                    `;
                                    tutorPanel.classList.add('open');
                                }
                                return;
                            }

                            const chunk = decoder.decode(value, { stream: true });
                            accumulatedText += chunk;

                            // Show truncated streaming preview
                            const preview = accumulatedText.slice(-80).replace(/\n/g, ' ');
                            streamLine.textContent = '> ' + preview;

                            return read();
                        });
                    }
                    return read();
                })
                .catch(error => {
                    console.error('Error fetching learning path:', error);
                    panelBody.innerHTML = `
                        <p class="panel-terminal-line">> [ NETWORK ERROR ]</p>
                        <p class="panel-terminal-line" style="color:#ef4444;">> ${error.message}</p>
                    `;
                    tutorPanel.classList.add('open');
                })
                .finally(() => {
                    queryInput.disabled = false;
                    submitButton.disabled = false;
                    queryInput.placeholder = originalPlaceholder;
                    queryInput.value = query;
                });
        };

        // Search Bar Event Listener
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const queryInput = document.getElementById('search-query');
            generateNewCurriculum(queryInput.value.trim());
        });
    </script>
</body>
